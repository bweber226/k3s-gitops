apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: lazylibrarian
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: git@github.com:bweber226/k3s-gitops.git
    targetRevision: HEAD
    path: apps/lazylibrarian
  destination:
    server: https://kubernetes.default.svc
    namespace: media
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true